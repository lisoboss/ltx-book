title: "LTX-2 技术指南"
tagline: "基于 LTX-2 开源模型的系列技术电子书"
description: >-
  基于 Lightricks LTX-2 开源音视频生成模型的系列技术电子书。
  涵盖 AI 动漫创作、视频生成、模型训练等主题，从入门到进阶。
author: liso
lang: zh-CN
url: "https://lisoboss.github.io"
baseurl: "/ltx-book"

# 主题配置
theme: minima

# minima 主题自定义
minima:
  skin: auto
  date_format: "%Y-%m-%d"

# 每本书是一个 Jekyll collection（_<slug>/ 目录）
collections:
  ai-anime:
    output: true
    permalink: /books/:collection/:name/
  ltx-sdk:
    output: true
    permalink: /books/:collection/:name/

# 默认 frontmatter
defaults:
  - scope:
      path: ""
      type: "ai-anime"
    values:
      layout: "chapter"
  - scope:
      path: ""
      type: "ltx-sdk"
    values:
      layout: "chapter"

# 从构建中排除的路径
exclude:
  - LTX-2/
  - vendor/
  - CLAUDE.md
  - .claude/
  - .gitmodules
  - .gitignore

# 启用的插件（GitHub Pages 允许）
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap

# jekyll-relative-links 设置
relative_links:
  enabled: true
  collections: true
