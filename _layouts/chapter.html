---
layout: default
---
<article class="chapter" itemscope itemtype="https://schema.org/Article">
  <header class="chapter-header">
    <h1 class="chapter-title" itemprop="headline">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="chapter-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="chapter-content" itemprop="articleBody">
    {{ content }}
  </div>

  {%- include chapter-nav.html -%}
</article>
